name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build 2026-04-11-fabric-js
        working-directory: 2026-04-11-fabric-js
        env:
          VITE_BASE: /playground/2026-04-11-fabric-js/
        run: pnpm install && pnpm build

      - name: Build 2026-04-11-fast-embed
        working-directory: 2026-04-11-fast-embed
        env:
          VITE_BASE: /playground/2026-04-11-fast-embed/
        run: pnpm install && pnpm build

      - name: Build 2026-04-11-react-flow
        working-directory: 2026-04-11-react-flow
        env:
          VITE_BASE: /playground/2026-04-11-react-flow/
        run: pnpm install && pnpm build

      - name: Build 2026-04-11-react-flow-2
        working-directory: 2026-04-11-react-flow-2
        env:
          VITE_BASE: /playground/2026-04-11-react-flow-2/
        run: pnpm install && pnpm build

      - name: Assemble deploy directory
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r 2026-04-12-puyopuyo _site/
          cp -r 2026-04-11-fabric-js/dist/. _site/2026-04-11-fabric-js/
          cp -r 2026-04-11-fast-embed/dist/. _site/2026-04-11-fast-embed/
          cp -r 2026-04-11-react-flow/dist/. _site/2026-04-11-react-flow/
          cp -r 2026-04-11-react-flow-2/dist/. _site/2026-04-11-react-flow-2/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
