<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      padding: 48px 24px;
    }
    h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #f0f6fc;
    }
    .subtitle {
      color: #8b949e;
      margin-bottom: 40px;
      font-size: 0.95rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      max-width: 900px;
    }
    a.card {
      display: block;
      padding: 20px 24px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
    }
    a.card:hover {
      border-color: #58a6ff;
      background: #1c2128;
    }
    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: #58a6ff;
      margin-bottom: 4px;
    }
    .card-date {
      font-size: 0.8rem;
      color: #8b949e;
    }
  </style>
</head>
<body>
  <h1>playground</h1>
  <p class="subtitle">labs &amp; experiments</p>
  <div class="grid">
    <a class="card" href="2026-04-21-live2d-on-browser/">
      <div class="card-title">Live2D Face Tracker</div>
      <div class="card-date">2026-04-21</div>
    </a>
    <a class="card" href="2026-04-12-puyopuyo/">
      <div class="card-title">ぷよぷよ</div>
      <div class="card-date">2026-04-12</div>
    </a>
    <a class="card" href="2026-04-11-react-flow-2/">
      <div class="card-title">2026-04-11-react-flow-2</div>
      <div class="card-date">2026-04-11</div>
    </a>
    <a class="card" href="2026-04-11-react-flow/">
      <div class="card-title">2026-04-11-react-flow</div>
      <div class="card-date">2026-04-11</div>
    </a>
    <a class="card" href="2026-04-11-fast-embed/">
      <div class="card-title">2026-04-11-fast-embed</div>
      <div class="card-date">2026-04-11</div>
    </a>
    <a class="card" href="2026-04-11-fabric-js/">
      <div class="card-title">2026-04-11-fabric-js</div>
      <div class="card-date">2026-04-11</div>
    </a>
  </div>
</body>
</html>
